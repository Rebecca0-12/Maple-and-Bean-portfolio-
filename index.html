<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maple & Bean — Specialty Coffee &amp; Pastries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F5EFE6;
    --cream-soft:#EFE6D8;
    --dark:#3B2A1E;
    --dark-soft:#6b5a4c;
    --green:#3F5B43;
    --green-dark:#2F4534;
    --green-soft:#E4EAE2;
    --gold:#C9A66B;
    --white:#FFFFFF;
    --radius:14px;
    --radius-lg:26px;
    --shadow-sm:0 4px 16px rgba(59,42,30,0.08);
    --shadow-md:0 14px 36px rgba(59,42,30,0.14);
    --ease:cubic-bezier(.22,.68,0,1);
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--dark);
    font-family:'Inter',sans-serif;
    font-size:16px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{
    font-family:'Playfair Display',serif;
    margin:0;
    color:var(--dark);
    letter-spacing:-0.01em;
  }
  p{margin:0;}
  img{max-width:100%;display:block;}
  a{color:inherit;text-decoration:none;}
  section{padding:96px 6vw;}
  .eyebrow{
    font-size:13px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--green);
    font-weight:600;
    margin-bottom:14px;
    display:block;
  }

  /* Coffee-cup cursor for interactive elements */
  .btn, .nav-link, .nav-cta, .menu-toggle, .dot, .accordion-toggle, .social-icon{
    cursor: url('data:image/svg+xml;utf8,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20width=%2230%22%20height=%2230%22%20viewBox=%220%200%2030%2030%22%3E%3Cg%20transform=%22translate(1,1)%22%3E%3Cpath%20d=%22M3%2011h17v6a6%206%200%200%201-6%206H9a6%206%200%200%201-6-6v-6z%22%20fill=%22%233B2A1E%22/%3E%3Cpath%20d=%22M20%2013h3a3%203%200%200%201%200%206h-3%22%20fill=%22none%22%20stroke=%22%233B2A1E%22%20stroke-width=%222%22/%3E%3Cpath%20d=%22M7%209c0-2%202-2%202-4M12%209c0-2%202-2%202-4%22%20stroke=%22%233B2A1E%22%20stroke-width=%221.4%22%20fill=%22none%22%20stroke-linecap=%22round%22/%3E%3C/g%3E%3C/svg%3E') 14 14, pointer;
  }

  /* ---------- Reveal on scroll ---------- */
  .reveal{opacity:0; transform:translateY(26px); transition:opacity .8s var(--ease), transform .8s var(--ease);}
  .reveal.in{opacity:1; transform:translateY(0);}
  @media (prefers-reduced-motion: reduce){
    .reveal{opacity:1; transform:none; transition:none;}
    html{scroll-behavior:auto;}
  }

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:15px 30px;
    border-radius:999px;
    font-weight:600;
    font-size:15px;
    border:none;
    transition:transform .25s var(--ease), box-shadow .25s var(--ease), background .25s var(--ease);
    white-space:nowrap;
  }
  .btn-dark{background:var(--dark); color:var(--cream);}
  .btn-dark:hover{transform:translateY(-2px); box-shadow:0 10px 24px rgba(59,42,30,.28);}
  .btn-cream{background:var(--cream); color:var(--dark);}
  .btn-cream:hover{transform:translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,.18);}
  .btn-outline{background:transparent;border:1.5px solid var(--dark); color:var(--dark);}

  /* ---------- Navbar ---------- */
  .navbar{
    position:fixed; top:0; left:0; right:0; z-index:1000;
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 6vw;
    transition:background .35s var(--ease), padding .35s var(--ease), box-shadow .35s var(--ease);
  }
  .navbar.scrolled{
    background:rgba(245,239,230,0.92);
    backdrop-filter:blur(10px);
    padding:13px 6vw;
    box-shadow:0 6px 22px rgba(59,42,30,0.08);
  }
  .logo{
    font-family:'Playfair Display',serif;
    font-size:22px;
    font-weight:700;
    color:var(--dark);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .logo svg{flex-shrink:0;}
  .navbar.scrolled .logo, .navbar.scrolled .nav-link{color:var(--dark);}
  .nav-right{display:flex; align-items:center; gap:34px;}
  .nav-links{display:flex; gap:30px; list-style:none; margin:0; padding:0;}
  .nav-link{
    font-size:14.5px; font-weight:500; color:var(--dark);
    position:relative; padding-bottom:4px;
  }
  .nav-link::after{
    content:''; position:absolute; left:0; bottom:0; height:1.5px; width:0;
    background:var(--green); transition:width .3s var(--ease);
  }
  .nav-link:hover::after{width:100%;}
  .nav-cta{padding:11px 22px; font-size:14px;}
  .menu-toggle{
    display:none; background:none; border:none; flex-direction:column; gap:5px; padding:6px;
  }
  .menu-toggle span{width:24px; height:2px; background:var(--dark); display:block; border-radius:2px;}

  @media (max-width: 860px){
    .nav-links{
      position:fixed; top:0; right:0; height:100vh; width:78%; max-width:320px;
      background:var(--cream); flex-direction:column; gap:0; padding:100px 10px 0;
      transform:translateX(100%); transition:transform .4s var(--ease);
      box-shadow:-10px 0 30px rgba(0,0,0,.12);
    }
    .nav-links.open{transform:translateX(0);}
    .nav-links li{width:100%; border-bottom:1px solid rgba(59,42,30,.08);}
    .nav-link{display:block; padding:18px 22px;}
    .nav-cta{display:none;}
    .menu-toggle{display:flex;}
    .nav-right{gap:14px;}
  }

  /* ---------- Hero ---------- */
  .hero{
    position:relative; height:100vh; min-height:560px;
    display:flex; align-items:center; justify-content:center;
    padding:0 6vw; overflow:hidden;
  }
  .hero video, .hero .poster-img{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  }
  .hero-overlay{
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(30,21,14,.55) 0%, rgba(30,21,14,.45) 45%, rgba(30,21,14,.72) 100%);
  }
  .hero-content{position:relative; z-index:2; max-width:720px; text-align:center; color:var(--cream);}
  .hero-content h1{
    font-size:clamp(2.1rem, 5vw, 3.6rem);
    font-weight:600;
    line-height:1.22;
    color:#FBF7EE;
    margin-bottom:32px;
    opacity:0; transform:translateY(18px);
    animation:heroIn .9s var(--ease) .25s forwards;
  }
  .hero-content .btn{
    opacity:0; transform:translateY(18px);
    animation:heroIn .9s var(--ease) .55s forwards;
  }
